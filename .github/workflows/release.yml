name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  actions: read

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Install ShellCheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - run: go test ./...
      - run: go vet ./...
      - run: shellcheck scripts/bootstrap.sh scripts/new-offline-pack.sh
      - name: Secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  cli:
    needs: quality
    strategy:
      matrix:
        include:
          - goos: windows
            goarch: amd64
            ext: .exe
          - goos: windows
            goarch: arm64
            ext: .exe
          - goos: linux
            goarch: amd64
            ext: ''
          - goos: linux
            goarch: arm64
            ext: ''
          - goos: darwin
            goarch: amd64
            ext: ''
          - goos: darwin
            goarch: arm64
            ext: ''
    runs-on: ubuntu-latest
    env:
      GOOS: ${{ matrix.goos }}
      GOARCH: ${{ matrix.goarch }}
      CGO_ENABLED: '0'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - name: Build and package
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          case "$GOOS" in windows) display_os=Windows;; linux) display_os=Linux;; darwin) display_os=macOS;; esac
          case "$GOARCH" in amd64) display_arch=x64;; arm64) display_arch=ARM64;; esac
          name="SSH-Launchpad_${version}_${display_os}_${display_arch}_Portable"
          mkdir -p "stage/${name}/profiles"
          go build -trimpath -ldflags="-s -w -X github.com/Shallow-dusty/ssh-launchpad/internal/launchpad.Version=${version}" -o "stage/${name}/ssh-launchpad${{ matrix.ext }}" ./cmd/ssh-launchpad
          cp LICENSE README.md CHANGELOG.md "stage/${name}/"
          cp profiles/*.yaml "stage/${name}/profiles/"
          cp docs/offline-help.zh-CN.md "stage/${name}/离线帮助-中文.md"
          cp docs/offline-help.en.md "stage/${name}/Offline Help - English.md"
          cp docs/offline-pack.md scripts/new-offline-pack.ps1 scripts/new-offline-pack.sh "stage/${name}/"
          if [[ "$GOOS" == windows ]]; then
            cp "packaging/launchers/开始使用 SSH Launchpad.cmd" "packaging/launchers/Start SSH Launchpad.cmd" "stage/${name}/"
          elif [[ "$GOOS" == darwin ]]; then
            cp "packaging/launchers/Start SSH Launchpad.command" "stage/${name}/"
            chmod +x "stage/${name}/Start SSH Launchpad.command" "stage/${name}/ssh-launchpad"
          else
            cp packaging/launchers/ssh-launchpad.desktop "stage/${name}/"
            chmod +x "stage/${name}/ssh-launchpad"
          fi
          (cd "stage/${name}" && find . -type f ! -name bundle-checksums.txt -print0 | sort -z | xargs -0 sha256sum | sed 's|  \./|  |' > bundle-checksums.txt)
          if [[ "$GOOS" == windows ]]; then
            cd stage
            zip -qr "../${name}.zip" "${name}"
          else
            tar -C stage -czf "${name}.tar.gz" "${name}"
          fi
      - uses: actions/upload-artifact@v6
        with:
          name: cli-${{ matrix.goos }}-${{ matrix.goarch }}
          path: SSH-Launchpad_*.*
          if-no-files-found: error

  bootstrap:
    needs: quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Package standalone bootstraps
        shell: bash
        run: |
          version="${GITHUB_REF_NAME#v}"
          name="ssh-launchpad_${version}_bootstrap"
          mkdir -p "${name}/profiles"
          cp scripts/bootstrap.ps1 scripts/bootstrap.sh scripts/new-offline-pack.ps1 scripts/new-offline-pack.sh LICENSE README.md "${name}/"
          cp docs/offline-help.zh-CN.md docs/offline-help.en.md docs/offline-pack.md "${name}/"
          cp profiles/*.yaml "${name}/profiles/"
          zip -qr "${name}.zip" "${name}"
      - uses: actions/upload-artifact@v6
        with:
          name: bootstrap
          path: ssh-launchpad_*_bootstrap.zip

  desktop-windows:
    needs: quality
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod
          cache-dependency-path: go.sum
      - uses: pnpm/action-setup@v4
        with:
          version: 10
      - uses: actions/setup-node@v6
        with:
          node-version: '24'
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml
      - name: Install build tools
        shell: pwsh
        run: |
          go install github.com/wailsapp/wails/v2/cmd/wails@v2.13.0
          choco install nsis -y --no-progress
          $nsisDirectory = Join-Path ${env:ProgramFiles(x86)} 'NSIS'
          $makeNSIS = Join-Path $nsisDirectory 'makensis.exe'
          if (-not (Test-Path -LiteralPath $makeNSIS)) { throw "makensis.exe missing at $makeNSIS" }
          & $makeNSIS /VERSION
          $nsisDirectory | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
      - name: Install frontend
        working-directory: frontend
        run: pnpm install --frozen-lockfile
      - name: Install test dependencies
        shell: pwsh
        run: |
          Install-Module Pester -MinimumVersion 5.7.1 -Force -Scope CurrentUser
          pnpm --dir frontend exec playwright install chromium
      - name: Script and browser tests
        shell: pwsh
        run: |
          Invoke-Pester -Path tests -CI
          pnpm --dir frontend run build
          pnpm --dir frontend run test:e2e
      - name: Build user-scope installer
        run: wails build -clean -nsis -webview2 embed -installscope user -platform windows/amd64
      - name: Name installer
        shell: pwsh
        run: |
          $version = $env:GITHUB_REF_NAME.TrimStart('v')
          $installer = Get-ChildItem build/bin -Filter '*installer.exe' | Select-Object -First 1
          if (-not $installer) { throw 'NSIS installer missing' }
          Copy-Item $installer.FullName "SSH-Launchpad_${version}_Windows_x64_Installer_UNSIGNED.exe"
      - uses: actions/upload-artifact@v6
        with:
          name: desktop-windows
          path: SSH-Launchpad_*_Windows_x64_Installer_UNSIGNED.exe
          if-no-files-found: error

  publish:
    needs: [cli, bootstrap, desktop-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          path: release-assets
          merge-multiple: true
      - name: Generate SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: spdx-json
          artifact-name: ssh-launchpad.spdx.json
          output-file: release-assets/ssh-launchpad.spdx.json
          upload-artifact: false
          upload-release-assets: false
      - name: Generate checksums
        working-directory: release-assets
        run: |
          sha256sum ./* | sort -k2 | sed 's|  \./|  |' > checksums.txt
      - name: Package smoke
        shell: pwsh
        run: ./tests/package-smoke.ps1 -Path ./release-assets
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          gh release create "$GITHUB_REF_NAME" release-assets/* \
            --verify-tag \
            --title "SSH Launchpad $GITHUB_REF_NAME" \
            --notes-file .github/release-notes-v0.2.0.md
